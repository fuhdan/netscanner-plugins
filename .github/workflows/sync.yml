name: Sync plugins to netscanner

on:
  push:
    branches: [main]
    paths:
      - "plugins/**"
      - "tests/test_plugin_*.py"
  workflow_dispatch:

jobs:
  validate:
    name: Validate before sync
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install bandit pytest -q

      - name: Security scan
        run: bandit -r plugins/ -ll

      - name: Clone netscanner
        run: git clone --depth=1 https://github.com/fuhdan/netscanner.git netscanner-workspace

      - name: Install plugins into netscanner
        run: |
          cp plugins/__init__.py netscanner-workspace/plugins/
          cp plugins/*.py netscanner-workspace/plugins/
          for f in plugins/*.md; do
            [ -f "$f" ] && cp "$f" netscanner-workspace/plugins/
          done
          cp tests/test_plugin_*.py netscanner-workspace/tests/

      - name: Verify plugin discovery
        run: python3 netscanner-workspace/netscanner.py --list-protocols

      - name: Run full test suite
        run: python3 -m pytest netscanner-workspace/tests/ -v

  sync:
    name: Sync to netscanner
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Clone netscanner
        run: |
          git clone \
            https://x-access-token:${{ secrets.NETSCANNER_PAT }}@github.com/fuhdan/netscanner.git \
            netscanner-repo

      - name: Copy plugin files
        run: |
          cp plugins/__init__.py netscanner-repo/plugins/
          cp plugins/*.py netscanner-repo/plugins/
          for f in plugins/*.md; do
            [ -f "$f" ] && cp "$f" netscanner-repo/plugins/
          done
          cp tests/test_plugin_*.py netscanner-repo/tests/

      - name: Push plugins directly to netscanner main
        run: |
          cd netscanner-repo
          git config user.name "netscanner-sync"
          git config user.email "github-actions@github.com"

          git add plugins/ tests/

          if git diff --cached --quiet; then
            echo "No plugin changes — nothing to sync."
            exit 0
          fi

          git commit -m "sync: update plugins from netscanner-plugins"
          git push origin main
