name: Validate

on:
  pull_request:
    branches: [main]

jobs:
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit -q

      - name: Scan plugins for security issues
        run: bandit -r plugins/ -ll

  test:
    name: Test plugins (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pytest
        run: pip install pytest -q

      - name: Clone netscanner
        run: git clone --depth=1 https://github.com/fuhdan/netscanner.git netscanner-workspace

      - name: Install plugins into netscanner
        run: |
          cp plugins/*.py netscanner-workspace/plugins/
          cp tests/test_plugin_*.py netscanner-workspace/tests/

      - name: Check all plugins are discovered
        run: python3 netscanner-workspace/netscanner.py --list-protocols

      - name: Run full test suite
        run: python3 -m pytest netscanner-workspace/tests/ -v
